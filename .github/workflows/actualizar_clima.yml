name: Actualizar Clima Santa Rosa

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install requests

      - name: Ejecutar scraper
        run: python scraper_santarosa.py

      - name: Guardar los nuevos datos
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add clima_santarosa.json
          git commit -m "Actualización automática del clima" || echo "No hay cambios para guardar"
          git push

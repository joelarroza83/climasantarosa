<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Meteorológica - Santa Rosa, Misiones</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para los íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js para los gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 1.5rem; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .icon-box { width: 3rem; height: 3rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Encabezado -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-blue-900 text-white p-6 rounded-2xl shadow-lg">
            <div>
                <h1 class="text-3xl font-bold mb-2"><i class="fas fa-cloud-sun-rain mr-3"></i>Estación Meteorológica</h1>
                <h2 id="ciudad-text" class="text-xl text-blue-200">Cargando ubicación...</h2>
            </div>
            <div class="mt-4 md:mt-0 text-right">
                <p class="text-sm text-blue-200">Última actualización</p>
                <p id="fecha-text" class="text-lg font-semibold animate-pulse">Consultando sensores...</p>
            </div>
        </div>

        <!-- Tarjetas de Sensores Actuales -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6 mb-8">
            <div class="card flex items-center gap-4 border-b-4 border-red-500">
                <div class="icon-box bg-red-100 text-red-500"><i class="fas fa-temperature-high"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-semibold">Temperatura</p>
                    <p id="val-temp" class="text-2xl font-bold text-gray-800">-- °C</p>
                </div>
            </div>
            <div class="card flex items-center gap-4 border-b-4 border-blue-500">
                <div class="icon-box bg-blue-100 text-blue-500"><i class="fas fa-tint"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-semibold">Humedad</p>
                    <p id="val-hum" class="text-2xl font-bold text-gray-800">-- %</p>
                </div>
            </div>
            <div class="card flex items-center gap-4 border-b-4 border-cyan-500">
                <div class="icon-box bg-cyan-100 text-cyan-500"><i class="fas fa-cloud-showers-heavy"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-semibold">Lluvia Caída</p>
                    <p id="val-lluvia" class="text-2xl font-bold text-gray-800">-- mm</p>
                </div>
            </div>
            <div class="card flex items-center gap-4 border-b-4 border-gray-500">
                <div class="icon-box bg-gray-100 text-gray-600"><i class="fas fa-wind"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-semibold">Viento</p>
                    <p id="val-viento" class="text-xl font-bold text-gray-800">-- km/h</p>
                    <p id="val-viento-dir" class="text-xs text-gray-500">Dir: --</p>
                </div>
            </div>
            <div class="card flex items-center gap-4 border-b-4 border-yellow-500">
                <div class="icon-box bg-yellow-100 text-yellow-600"><i class="fas fa-sun"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-semibold">Índice UV</p>
                    <p id="val-uv" class="text-2xl font-bold text-gray-800">--</p>
                </div>
            </div>
            <div class="card flex items-center gap-4 border-b-4 border-purple-500">
                <div class="icon-box bg-purple-100 text-purple-500"><i class="fas fa-compress-arrows-alt"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-semibold">Presión</p>
                    <p id="val-presion" class="text-xl font-bold text-gray-800">-- hPa</p>
                </div>
            </div>
        </div>

        <!-- Gráficos -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="card">
                <h3 class="text-lg font-semibold text-gray-700 mb-4"><i class="fas fa-chart-line mr-2"></i>Evolución Temperatura (24h)</h3>
                <canvas id="chartTemperatura"></canvas>
            </div>
            <div class="card">
                <h3 class="text-lg font-semibold text-gray-700 mb-4"><i class="fas fa-chart-area mr-2"></i>Humedad y Precipitaciones (24h)</h3>
                <canvas id="chartHumedad"></canvas>
            </div>
        </div>
    </div>

    <script>
        function obtenerPuntoCardinal(grados) {
            const direcciones = ['Norte (N)', 'Noreste (NE)', 'Este (E)', 'Sureste (SE)', 'Sur (S)', 'Suroeste (SO)', 'Oeste (O)', 'Noroeste (NO)'];
            return direcciones[Math.round(grados / 45) % 8];
        }

        function formatearHora(isoString) {
            const date = new Date(isoString);
            return date.getHours().toString().padStart(2, '0') + ':00';
        }

        async function cargarDatos() {
            let data;
            try {
                // Leer el archivo generado por el scraper en GitHub
                const response = await fetch('clima_santarosa.json');
                if (!response.ok) throw new Error('No se encontró el archivo');
                data = await response.json();
            } catch (error) {
                console.warn("No se pudo cargar JSON, mostrando datos demo.");
                const horasDemo = Array.from({length: 24}, (_, i) => `2024-01-01T${String(i).padStart(2, '0')}:00`);
                data = {
                    ciudad: "Santa Rosa, Misiones (Esperando datos de Python...)",
                    fecha_actualizacion: new Date().toLocaleString(),
                    actual: { temperatura: 0, humedad: 0, viento_velocidad: 0, viento_direccion: 0, lluvia: 0, presion: 0, uv: 0 },
                    historial: { horas: horasDemo, temperatura: Array(24).fill(0), humedad: Array(24).fill(0), lluvia: Array(24).fill(0) }
                };
            }

            document.getElementById('ciudad-text').innerText = data.ciudad;
            document.getElementById('fecha-text').innerText = data.fecha_actualizacion;

            document.getElementById('val-temp').innerText = `${data.actual.temperatura} °C`;
            document.getElementById('val-hum').innerText = `${data.actual.humedad} %`;
            document.getElementById('val-lluvia').innerText = `${data.actual.lluvia} mm`;
            document.getElementById('val-viento').innerText = `${data.actual.viento_velocidad} km/h`;
            document.getElementById('val-viento-dir').innerText = `Dir: ${obtenerPuntoCardinal(data.actual.viento_direccion)}`;
            document.getElementById('val-uv').innerText = data.actual.uv;
            document.getElementById('val-presion').innerText = `${data.actual.presion} hPa`;

            const etiquetasHoras = data.historial.horas.map(formatearHora);

            // Evitar duplicar gráficos si la función se llama varias veces
            if (window.chartTemp) window.chartTemp.destroy();
            if (window.chartHum) window.chartHum.destroy();

            const ctxTemp = document.getElementById('chartTemperatura').getContext('2d');
            window.chartTemp = new Chart(ctxTemp, {
                type: 'line',
                data: {
                    labels: etiquetasHoras,
                    datasets: [{
                        label: 'Temperatura (°C)',
                        data: data.historial.temperatura,
                        borderColor: 'rgb(239, 68, 68)',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'top' } } }
            });

            const ctxHum = document.getElementById('chartHumedad').getContext('2d');
            window.chartHum = new Chart(ctxHum, {
                type: 'bar',
                data: {
                    labels: etiquetasHoras,
                    datasets: [
                        { label: 'Lluvia (mm)', data: data.historial.lluvia, backgroundColor: 'rgba(6, 182, 212, 0.6)', yAxisID: 'y1', type: 'bar' },
                        { label: 'Humedad (%)', data: data.historial.humedad, borderColor: 'rgb(59, 130, 246)', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, tension: 0.4, yAxisID: 'y', type: 'line', fill: true }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { type: 'linear', display: true, position: 'left', min: 0, max: 100 },
                        y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        cargarDatos();
        setInterval(cargarDatos, 60000); // Recarga automática
    </script>
</body>
</html>
